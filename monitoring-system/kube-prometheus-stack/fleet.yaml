defaultNamespace: monitoring-system

dependsOn:
  - selector:
      matchLabels:
        gateway-api-crds: "true"

helm:
  repo: https://prometheus-community.github.io/helm-charts
  chart: kube-prometheus-stack
  version: 87.3.0
  releaseName: kube-prometheus-stack
  values:
    crds:
      upgradeJob:
        enabled: true
    prometheus:
      prometheusSpec:
        retention: 30d
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi
    prometheus-node-exporter:
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - key: CriticalAddonsOnly
          effect: NoExecute
          operator: Exists
    extraManifests:
      - apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: prometheus
        spec:
          parentRefs:
            - name: default-gateway
              namespace: kube-system
          hostnames:
            - "prometheus.homelab.cloudbending.dev"
          rules:
            - backendRefs:
                - name: kube-prometheus-stack-prometheus
                  port: 9090
      - apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: grafana
        spec:
          parentRefs:
            - name: default-gateway
              namespace: kube-system
          hostnames:
            - "grafana.homelab.cloudbending.dev"
          rules:
            - backendRefs:
                - name: kube-prometheus-stack-grafana
                  port: 80

diff:
  comparePatches:
    # The admission webhooks' `webhooks` entries are managed entirely outside the chart
    # manifest: kube-webhook-certgen injects clientConfig.caBundle, and the apiserver
    # defaults matchPolicy, reinvocationPolicy, namespaceSelector, objectSelector,
    # clientConfig.service.port and rules[].scope. Because `webhooks` is a JSON array,
    # Fleet diffs it atomically, so any of those keeps the bundle perpetually "Modified".
    # Stripping individual fields (e.g. just caBundle) can't help — drop the whole array
    # from drift detection.
    - apiVersion: admissionregistration.k8s.io/v1
      kind: MutatingWebhookConfiguration
      name: kube-prometheus-stack-admission
      operations:
        - { "op": "remove", "path": "/webhooks" }
    - apiVersion: admissionregistration.k8s.io/v1
      kind: ValidatingWebhookConfiguration
      name: kube-prometheus-stack-admission
      operations:
        - { "op": "remove", "path": "/webhooks" }
