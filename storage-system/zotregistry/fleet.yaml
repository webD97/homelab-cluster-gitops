defaultNamespace: storage-system

helm:
  repo: https://zotregistry.dev/helm-charts
  chart: zot
  version: 0.1.116
  releaseName: zot
  values:
    httproute:
      enabled: true
      hostnames: [registry.homelab.cloudbending.dev]
      parentRefs:
        - name: default-gateway
          namespace: kube-system
    persistence: true
    pvc:
      create: true
      storage: 50Gi
