apiVersion: v1
kind: ServiceAccount
metadata:
  name: paperless-ngx-backup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: paperless-ngx-backup-command-runner
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: paperless-ngx-backup
subjects:
  - kind: ServiceAccount
    name: paperless-ngx-backup
    namespace: virtual-office
roleRef:
  kind: Role
  name: paperless-ngx-backup-command-runner
  apiGroup: rbac.authorization.k8s.io
