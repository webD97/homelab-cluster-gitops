apiVersion: batch/v1
kind: CronJob
metadata:
  name: paperless-ngx-backup
spec:
  schedule: "45 23 * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: paperless-ngx-backup
        spec:
          serviceAccountName: paperless-ngx-backup
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: docker.io/rancher/kubectl:v1.34.5
              command:
                - kubectl
              args:
                - auth
                - whoami
