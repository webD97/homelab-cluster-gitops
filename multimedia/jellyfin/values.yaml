image:
  repository: docker.io/jellyfin/jellyfin
  tag: "10.11.11"

persistence:
  media:
    size: 3072Gi
  cache:
    enabled: true
    type: pvc
    size: 10Gi

resources:
  requests:
    generic.dev/render: 1
  limits:
    generic.dev/render: 1

deploymentStrategy:
  type: Recreate

# The chart's default liveness/readiness probes hit /health with a 1s timeout. Jellyfin's
# .NET thread pool intermittently overshoots that during library scans / image extraction /
# GC pauses, so the kubelet kills an otherwise-healthy server (~52 restarts/13h, all liveness
# timeouts; /health normally answers in ~5ms, mem ~140MB, no OOM). Give the probes headroom.
livenessProbe:
  timeoutSeconds: 10
  periodSeconds: 20
  failureThreshold: 5
readinessProbe:
  timeoutSeconds: 5

httpRoute:
  enabled: true
  parentRefs:
    - name: default-gateway
      namespace: kube-system
  hostnames:
    - "jellyfin.homelab.cloudbending.dev"
