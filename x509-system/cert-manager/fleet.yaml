defaultNamespace: x509-system

labels:
  cert-manager: "true"

helm:
  repo: https://charts.jetstack.io
  chart: cert-manager
  version: v1.20.3
  releaseName: cert-manager
  values:
    installCRDs: true
    # Without this, cert-manager will fail with
    # > Could not determine authoritative nameservers for _acme-challenge.homelab.cloudbending.dev.
    # This is probably some interference with the local nameserver that handles the homelab domains.
    dns01RecursiveNameservers: "9.9.9.9:53"

    # This seems to be an upcoming feature:
    #crds:
    #  enabled: true
    #  keep: true

diff:
  comparePatches:
    # cert-manager's admission webhook `webhooks` entries are managed entirely outside
    # the chart manifest: cainjector injects clientConfig.caBundle, and the apiserver
    # defaults matchPolicy, reinvocationPolicy, namespaceSelector, objectSelector,
    # clientConfig.service.port and rules[].scope. Because `webhooks` is a JSON array,
    # Fleet diffs it atomically, so any of those keeps the bundle perpetually "Modified"
    # (which here also blocks dependents like cilium-gateway via dependsOn). Stripping
    # individual fields can't help — drop the whole array from drift detection.
    - apiVersion: admissionregistration.k8s.io/v1
      kind: MutatingWebhookConfiguration
      name: cert-manager-webhook
      operations:
        - { "op": "remove", "path": "/webhooks" }
    - apiVersion: admissionregistration.k8s.io/v1
      kind: ValidatingWebhookConfiguration
      name: cert-manager-webhook
      operations:
        - { "op": "remove", "path": "/webhooks" }
