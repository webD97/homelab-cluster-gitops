defaultNamespace: kube-system

helm:
  repo: https://helm.cilium.io/
  chart: cilium
  version: "1.19.1"
  releaseName: cilium-preflight
  values:
    k8sServiceHost: 192.168.38.1
    k8sServicePort: 6443

    preflight:
      enabled: true

    envoy:
      enabled: false

    agent: false

    operator:
      enabled: false

targetCustomizations:
  - name: disable-when-unlabeled
    doNotDeploy: true
    clusterSelector:
      matchExpressions:
        - key: "x-cilium-preflight"
          operator: DoesNotExist
