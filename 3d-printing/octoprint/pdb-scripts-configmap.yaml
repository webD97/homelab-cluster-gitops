apiVersion: v1
kind: ConfigMap
metadata:
  name: octoprint-pdb-scripts
data:
  functions.sh: |
    API_SERVER="https://kubernetes.default.svc"
    TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    CACERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)

    k8s_apply() {
      local api_path="$1"
      local file="$2"

      curl -sS -X PATCH \
        "$API_SERVER$api_path?fieldManager=curl" \
        -H "Authorization: Bearer $TOKEN" \
        -H "Content-Type: application/apply-patch+yaml" \
        --cacert "$CACERT" \
        --data-binary @"$file"
    }

    k8s_delete() {
      local api_path="$1"

      curl -sS -X DELETE \
        "$API_SERVER$api_path" \
        -H "Authorization: Bearer $TOKEN" \
        --cacert "$CACERT"
    }
  pdb.yaml: |
    apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: octoprint-while-connected
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: octoprint
  on_printer_connected.sh: |
    #!/bin/bash
    set -euo pipefail
    SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
    source "$SCRIPT_DIR/functions.sh"
    k8s_apply "/apis/apps/v1/namespaces/$NAMESPACE/poddisruptionbudgets/octoprint-while-connected" "$SCRIPT_DIR/pdb.yaml"
  on_printer_disconnected.sh: |
    #!/bin/bash
    set -euo pipefail
    SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
    source "$SCRIPT_DIR/functions.sh"
    k8s_delete "/apis/apps/v1/namespaces/$NAMESPACE/poddisruptionbudgets/octoprint-while-connected"
